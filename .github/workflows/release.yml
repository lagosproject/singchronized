name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04
            bundles: appimage,deb
          - platform: windows-latest
            bundles: nsis
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev \
            librsvg2-dev patchelf build-essential libssl-dev libgtk-3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - uses: dtolnay/rust-toolchain@stable

      - uses: swatinem/rust-cache@v2
        with:
          workspaces: frontend/src-tauri

      - name: Install backend dependencies (CPU torch)
        shell: bash
        run: |
          python -m pip install --upgrade pip
          # CPU-only torch keeps the bundle a fraction of the CUDA build's size
          pip install torch torchaudio --index-url https://download.pytorch.org/whl/cpu
          pip install -r backend/requirements.txt pyinstaller

      - name: Build backend sidecar with PyInstaller
        shell: bash
        run: pyinstaller singchronized-backend.spec --noconfirm

      - name: Stage backend into Tauri resources
        shell: bash
        run: |
          mkdir -p frontend/src-tauri/resources
          cp -r dist/singchronized-backend frontend/src-tauri/resources/backend

      - name: Help linuxdeploy resolve PyInstaller libs (AppImage)
        if: matrix.platform == 'ubuntu-22.04'
        # linuxdeploy ignores rpath/$ORIGIN, so wheel-mangled libs inside the
        # frozen backend (e.g. libdrm-<hash>.so from av/torchcodec) appear
        # unresolvable. Point LD_LIBRARY_PATH at the lib dirs as they will be
        # staged inside the AppDir; libs found there are treated as already
        # deployed instead of being copied again.
        run: |
          appdir="$GITHUB_WORKSPACE/frontend/src-tauri/target/release/bundle/appimage/SingChronized.AppDir/usr/lib/SingChronized/backend"
          libpath=$(find dist/singchronized-backend/_internal -name '*.so*' -printf '%h\n' | sort -u \
            | sed "s|^dist/singchronized-backend|$appdir|" | paste -sd:)
          echo "LD_LIBRARY_PATH=$libpath" >> "$GITHUB_ENV"
          echo "NO_STRIP=true" >> "$GITHUB_ENV"

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Build and bundle Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: frontend
          # On tag pushes, upload bundles to a draft GitHub release
          tagName: ${{ startsWith(github.ref, 'refs/tags/') && github.ref_name || '' }}
          releaseName: ${{ startsWith(github.ref, 'refs/tags/') && format('SingChronized {0}', github.ref_name) || '' }}
          releaseDraft: true
          args: --bundles ${{ matrix.bundles }}

      - name: Upload artifacts (manual runs)
        if: ${{ !startsWith(github.ref, 'refs/tags/') }}
        uses: actions/upload-artifact@v4
        with:
          name: singchronized-${{ matrix.platform }}
          path: |
            frontend/src-tauri/target/release/bundle/deb/*.deb
            frontend/src-tauri/target/release/bundle/appimage/*.AppImage
            frontend/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: error
